<!DOCTYPE html>
<html>
<head>
    <title>Cloud Monitoring Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 220px;
            margin: 15px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 5px gray;
            text-align: center;
        }

        .value {
            font-size: 30px;
            font-weight: bold;
            color: #007bff;
        }
    </style>
</head>
<body>

    <h1>Cloud Monitoring Dashboard</h1>

    <div class="container">

        <div class="card">
            <h3>CPU Usage</h3>
            <div class="value">45%</div>
        </div>

        <div class="card">
            <h3>Memory Usage</h3>
            <div class="value">68%</div>
        </div>

        <div class="card">
            <h3>Disk Usage</h3>
            <div class="value">52%</div>
        </div>

        <div class="card">
            <h3>Network Traffic</h3>
            <div class="value">120 Mbps</div>
        </div>

    </div>

</body>
</html>
